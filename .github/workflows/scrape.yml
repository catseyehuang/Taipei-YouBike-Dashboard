name: YouBike Data Chronicler

on:
  schedule:
    - cron: '*/5 * * * *' # 鬧鐘設定：每 5 分鐘自動執行一次
  workflow_dispatch:      # 允許手動在 GitHub Actions 頁面點擊執行測試

permissions:
  contents: write         # 關鍵：赋予 GitHub Bot 寫入並 commit 檔案回儲存庫的權限
    

# 強制 GitHub 使用最新的 Node.js 24 環境來消除警告
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 檢出程式碼庫 (Checkout)
        uses: actions/checkout@v4

      - name: 2. 初始化 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 安裝相依套件
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: 4. 執行增量爬蟲腳本
        run: python scraper.py

      - name: 5. 檢查變動並自動推回 GitHub 儲存庫
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data/history_data.csv
          # 防護機制：只有在檔案確實有寫入變動時才進行 commit，避免產生空 commit 錯誤
          git diff --quiet && git diff --staged --quiet || (git commit -m "📊 歷史數據自動增量更新: $(date +'%Y-%m-%d %H:%M:%S')" && git push)
